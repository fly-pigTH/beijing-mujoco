<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0b1018">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>北京 · MuJoCo 微缩城市</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='13' font-size='13'>🏙️</text></svg>">
<style>
  :root { --fg:#eaf0f8; --bg:#0b1018; --accent:#ffce54; --card:rgba(12,18,28,.62); }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { margin:0; height:100%; overflow:hidden; background:var(--bg);
    font-family:-apple-system,"PingFang SC","Microsoft YaHei",Helvetica,Arial,sans-serif; }
  #c { position:fixed; inset:0; display:block; touch-action:none; }
  .panel { position:fixed; color:var(--fg); user-select:none;
    -webkit-backdrop-filter:blur(10px); backdrop-filter:blur(10px); z-index:5; }

  #title { top:max(14px,env(safe-area-inset-top)); left:16px; max-width:64vw; }
  #title h1 { margin:0; font-size:19px; font-weight:700; letter-spacing:.5px;
    text-shadow:0 2px 8px rgba(0,0,0,.6); }
  #title p { margin:4px 0 0; font-size:12px; opacity:.78; line-height:1.4; }

  #help { left:16px; bottom:max(14px,env(safe-area-inset-bottom)); font-size:12px;
    line-height:1.7; opacity:.86; background:var(--card); padding:9px 13px;
    border-radius:11px; border:1px solid rgba(255,255,255,.09); }
  #help b { color:var(--accent); font-weight:600; }

  /* info card (click a building) */
  #info { right:16px; top:max(14px,env(safe-area-inset-top)); width:300px; max-width:74vw;
    background:var(--card); padding:14px 16px 15px; border-radius:14px;
    border:1px solid rgba(255,255,255,.12); box-shadow:0 12px 40px rgba(0,0,0,.5);
    opacity:0; transform:translateY(-6px); pointer-events:none;
    transition:opacity .22s ease, transform .22s ease; }
  #info.show { opacity:1; transform:none; pointer-events:auto; }
  #info .tag { font-size:11px; letter-spacing:1.5px; text-transform:uppercase;
    color:var(--accent); opacity:.85; }
  #info .zh { font-size:23px; font-weight:800; line-height:1.2; margin-top:3px; }
  #info .intro { font-size:13.5px; line-height:1.65; opacity:.9; margin-top:9px; }
  #info .x { position:absolute; top:9px; right:11px; width:26px; height:26px;
    display:flex; align-items:center; justify-content:center; cursor:pointer;
    font-size:18px; opacity:.6; border-radius:50%; }
  #info .x:hover { opacity:1; background:rgba(255,255,255,.12); }

  #stat { right:16px; bottom:max(12px,env(safe-area-inset-bottom)); font-size:11px;
    opacity:.5; color:var(--fg); text-align:right; }

  #load { position:fixed; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:18px; background:var(--bg);
    color:var(--fg); z-index:20; transition:opacity .6s; }
  #load .ring { width:46px; height:46px; border:4px solid rgba(255,255,255,.15);
    border-top-color:var(--accent); border-radius:50%; animation:spin 1s linear infinite; }
  #load .t { font-size:13px; opacity:.85; } #load .s { font-size:11px; opacity:.5; }
  @keyframes spin { to { transform:rotate(360deg); } }
  a { color:var(--accent); }

  /* ---------- phone layout ---------- */
  @media (max-width:640px) {
    #title h1 { font-size:16px; } #title p { display:none; }
    #title { max-width:70vw; }
    #stat { display:none; }
    #help { font-size:11px; padding:7px 11px; line-height:1.5;
      left:50%; transform:translateX(-50%); bottom:calc(env(safe-area-inset-bottom) + 10px);
      white-space:nowrap; }
    /* info becomes a bottom sheet */
    #info { left:0; right:0; bottom:0; top:auto; width:100%; max-width:100%;
      border-radius:18px 18px 0 0; padding:16px 18px calc(env(safe-area-inset-bottom) + 18px);
      transform:translateY(110%); }
    #info.show { transform:none; }
    #info .zh { font-size:22px; } #info .intro { font-size:14px; }
    #info .x { width:34px; height:34px; font-size:22px; top:10px; right:12px; }
    body.sheet #help { opacity:0; pointer-events:none; }   /* avoid overlap */
  }
</style>
<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
}}
</script>
</head>
<body>
<canvas id="c"></canvas>
<div id="title" class="panel">
  <h1>北京 · 微缩城市</h1>
  <p>52 座地标 + 环路立交 + 城市肌理 · 由 MuJoCo WebAssembly 实时加载</p>
</div>

<div id="info" class="panel">
  <div class="x" id="infoclose">×</div>
  <div class="tag"></div>
  <div class="zh"></div>
  <div class="intro"></div>
</div>

<div id="help" class="panel"></div>
<div id="stat" class="panel"></div>

<div id="load">
  <div class="ring"></div>
  <div class="t">正在加载 MuJoCo WebAssembly…</div>
  <div class="s" id="loadsub">官方 mujoco-js · 解析模型中</div>
</div>
<script type="module" src="./app.js"></script>
</body>
</html>
