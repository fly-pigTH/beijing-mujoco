<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>北京 · MuJoCo 微缩城市</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='13' font-size='13'>🏙️</text></svg>">
<style>
  :root { --fg:#eaf0f8; --bg:#0b1018; --accent:#ffce54; }
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; overflow:hidden; background:var(--bg);
    font-family:-apple-system,"PingFang SC","Microsoft YaHei",Helvetica,Arial,sans-serif; }
  #c { position:fixed; inset:0; display:block; }
  .panel { position:fixed; color:var(--fg); user-select:none;
    -webkit-backdrop-filter:blur(8px); backdrop-filter:blur(8px); }
  #title { top:16px; left:18px; max-width:60vw; }
  #title h1 { margin:0; font-size:19px; font-weight:700; letter-spacing:.5px;
    text-shadow:0 2px 8px rgba(0,0,0,.6); }
  #title p { margin:4px 0 0; font-size:12px; opacity:.75; }
  #help { left:18px; bottom:16px; font-size:12px; line-height:1.7; opacity:.82;
    background:rgba(12,18,28,.45); padding:10px 14px; border-radius:10px;
    border:1px solid rgba(255,255,255,.08); }
  #help b { color:var(--accent); font-weight:600; }
  #info { right:18px; top:16px; min-width:140px; text-align:right;
    background:rgba(12,18,28,.5); padding:12px 16px; border-radius:10px;
    border:1px solid rgba(255,255,255,.1); opacity:0; transition:opacity .2s; }
  #info .zh { font-size:22px; font-weight:700; color:var(--accent); }
  #info .en { font-size:11px; opacity:.6; margin-top:2px; }
  #stat { right:18px; bottom:16px; font-size:11px; opacity:.55; color:var(--fg);
    text-align:right; }
  #load { position:fixed; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:18px; background:var(--bg);
    color:var(--fg); z-index:10; transition:opacity .6s; }
  #load .ring { width:46px; height:46px; border:4px solid rgba(255,255,255,.15);
    border-top-color:var(--accent); border-radius:50%; animation:spin 1s linear infinite; }
  #load .t { font-size:13px; opacity:.8; } #load .s { font-size:11px; opacity:.5; }
  @keyframes spin { to { transform:rotate(360deg); } }
  a { color:var(--accent); }
</style>
<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
}}
</script>
</head>
<body>
<canvas id="c"></canvas>
<div id="title" class="panel">
  <h1>北京 · 微缩城市</h1>
  <p>52 座地标 + 程序化城市肌理 · 由 MuJoCo WebAssembly 实时加载</p>
</div>
<div id="info" class="panel"><div class="zh"></div><div class="en"></div></div>
<div id="help" class="panel">
  <b>拖拽</b> 旋转 &nbsp;·&nbsp; <b>滚轮</b> 缩放 &nbsp;·&nbsp; <b>右键拖拽</b> 平移<br>
  <b>点击建筑</b> 查看地标名称
</div>
<div id="stat" class="panel"></div>
<div id="load">
  <div class="ring"></div>
  <div class="t">正在加载 MuJoCo WebAssembly…</div>
  <div class="s" id="loadsub">官方 mujoco-js · 解析模型中</div>
</div>
<script type="module" src="./app.js"></script>
</body>
</html>
